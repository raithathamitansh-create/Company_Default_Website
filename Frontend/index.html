<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LEFT PANEL -->
<div class="sidebar">
    <div class="sidebar-header">
        <div>
            <p class="eyebrow">Inventory</p>
            <h1>Products</h1>
        </div>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>

    <div class="search-box">
       <input id="searchInput" placeholder="Search product..." />
       <button id="searchBtn">Search</button>
    </div>
    
    <h3>Enter Details</h3>

    <div class="form-group">
        <label>Product</label>
        <input id="product" maxlength = "10">
    </div>

    <div class="form-group">
        <label>Quantity</label>
        <input id="quantity" type="number" max="50" min="1"  >
    </div>

    <div class="form-group">
        <label>Price per Quantity</label>
        <input id="price" type="number" min="1" max="60">
    </div>

    <div class="form-group">
        <label>Total Amount</label>
        <input id="total" type="number" readonly>
    </div>

    <button id="addBtn">Add</button>
    <button id="cancelEditBtn" class="secondary-btn" type="button">Cancel Edit</button>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <!-- PLUS ICON -->
    <div class="add-icon" id="addIcon">+</div>

    <div class="main-header">
        <div>
            <p class="eyebrow">Overview</p>
            <h2>Product Table</h2>
        </div>
    </div>

    <div class="stats-grid" aria-label="Product summary">
        <div class="stat-box">
            <span>Total Products</span>
            <strong id="totalProductsStat">0</strong>
        </div>
        <div class="stat-box">
            <span>Total Quantity</span>
            <strong id="totalQuantityStat">0</strong>
        </div>
        <div class="stat-box">
            <span>Total Amount</span>
            <strong id="totalAmountStat">0</strong>
        </div>
        <div class="stat-box">
            <span>Highest Price</span>
            <strong id="highestPriceProductStat">-</strong>
        </div>
    </div>

    <div class="table-actions" aria-label="Table actions">
        <button id="exportBtn" class="action-btn">Export Excel</button>
        <button id="shareBtn" class="action-btn">Share</button>
        <button id="whatsappBtn" class="action-btn whatsapp-btn">WhatsApp</button>
        <button id="mailBtn" class="action-btn mail-btn">Mail</button>
        <button id="driveBtn" class="action-btn drive-btn">Drive</button>
        <button id="copyBtn" class="action-btn copy-btn">Copy</button>
    </div>

    <div class="filter-actions" aria-label="Filter table">
        <input id="minPriceFilter" type="number" min="1" placeholder="Min price">
        <input id="maxPriceFilter" type="number" min="1" placeholder="Max price">
        <input id="minQuantityFilter" type="number" min="1" max="50" placeholder="Min qty">
        <input id="maxQuantityFilter" type="number" min="1" max="50" placeholder="Max qty">
        <input id="dateFromFilter" type="date" aria-label="Date from">
        <input id="dateToFilter" type="date" aria-label="Date to">
        <button id="clearFiltersBtn" class="sort-btn clear-sort-btn">Clear Filters</button>
    </div>

    <div class="sort-actions" aria-label="Sort table">
        <button id="sortProductBtn" class="sort-btn">Sort Product A-Z</button>
        <button id="sortQuantityBtn" class="sort-btn">Sort Quantity Low-High</button>
        <button id="sortPriceBtn" class="sort-btn">Sort Price Low-High</button>
        <button id="clearSortBtn" class="sort-btn clear-sort-btn">Clear Sort</button>
    </div>

    <p id="shareStatus" class="share-status" role="status" aria-live="polite"></p>
    <p id="tableSummary" class="table-summary"></p>

    <div class="table-card">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="pagination" aria-label="Table pagination">
        <button id="prevPageBtn" class="page-btn">Previous</button>
        <span id="paginationInfo" class="pagination-info">Page 1 of 1</span>
        <button id="nextPageBtn" class="page-btn">Next</button>
        <label class="page-size-label">
            Rows
            <select id="pageSizeSelect">
                <option value="5">5</option>
                <option value="10">10</option>
                <option value="20">20</option>
            </select>
        </label>
    </div>

</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<div id="confirmModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <h3 id="confirmTitle">Confirm Action</h3>
        <p id="confirmMessage"></p>
        <div class="modal-actions">
            <button id="confirmCancelBtn" class="modal-btn secondary-modal-btn">Cancel</button>
            <button id="confirmOkBtn" class="modal-btn danger-modal-btn">Confirm</button>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="script.js"></script>

</body>
</html>
