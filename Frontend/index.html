<!DOCTYPE html>
<html>
<head>
    <title>Product System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LEFT PANEL -->
<div class="sidebar">
    <button id="logoutBtn" class="logout-btn">Logout</button>

    <div style="margin-bottom: 10px;">
       <input id="searchInput" placeholder="Search product..." />
       <button id="searchBtn">Search</button>
    </div>
    
    <h3>Enter the details</h3>

    <div class="form-group">
        <label>Enter Product</label>
        <input id="product" maxlength = "10">
    </div>

    <div class="form-group">
        <label>Enter Quantity</label>
        <input id="quantity" type="number" max="20" min="1"  >
    </div>

    <div class="form-group">
        <label>Enter Price per Quantity</label>
        <input id="price" type="number" min="1" max="60">
    </div>

    <div class="form-group">
        <label>Total Amount</label>
        <input id="total" type="number" readonly>
    </div>

    <button id="addBtn">Add</button>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <!-- PLUS ICON -->
    <div class="add-icon" id="addIcon">+</div>

    <h2>Product Table</h2>

    <table id="dataTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<script src="script.js"></script>

</body>
</html>
